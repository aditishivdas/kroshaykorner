<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KroshayKorner — Owner Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <section id="login" class="login">
    <div class="login__card">
      <span class="eyebrow">— Owner access</span>
      <h1>Welcome back <em>♡</em></h1>
      <p>Log in to manage products and categories for KroshayKorner.</p>
      <form id="loginForm" class="login__form" autocomplete="off">
        <label>
          <span>Password</span>
          <input type="password" id="loginPassword" required autofocus />
        </label>
        <button type="submit" class="btn btn--primary">Log in</button>
        <p id="loginError" class="login__error" hidden></p>
      </form>
      <a href="/" class="login__back">← Back to site</a>
    </div>
  </section>

  <!-- ADMIN APP -->
  <main id="app" class="adm" hidden>

    <header class="adm__top">
      <div class="adm__brand">
        <a href="/" class="adm__logo">Kroshay<em>Korner</em> 🧶</a>
        <span class="adm__badge">Owner panel</span>
      </div>
      <div class="adm__top-right">
        <a href="/" class="adm__link">↗ View site</a>
        <button id="logoutBtn" class="adm__link adm__link--out">Log out</button>
      </div>
    </header>

    <div class="adm__layout">

      <!-- CATEGORIES SIDEBAR -->
      <aside class="adm__side">
        <h3>Categories</h3>
        <ul id="catList" class="cat-list"></ul>

        <form id="catForm" class="cat-form">
          <input id="catInput" type="text" placeholder="Add new category" maxlength="40" required />
          <button type="submit" aria-label="Add category">＋</button>
        </form>
        <p class="cat-hint">A category can only be deleted when no product uses it.</p>
      </aside>

      <!-- PRODUCT TABLE -->
      <section class="adm__main">
        <div class="adm__head">
          <div>
            <h2>Products</h2>
            <p id="counter" class="adm__counter">—</p>
          </div>
          <button id="addBtn" class="btn btn--primary">＋ Add product</button>
        </div>

        <div id="productList" class="prod-list">
          <!-- product rows injected here -->
        </div>
      </section>
    </div>

    <!-- EDIT / ADD MODAL -->
    <div id="modal" class="modal" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__panel" role="dialog" aria-modal="true">
        <header class="modal__head">
          <h3 id="modalTitle">New product</h3>
          <button class="modal__close" data-close aria-label="Close">✕</button>
        </header>

        <form id="productForm" class="modal__body">
          <input type="hidden" id="fId" />

          <label class="field field--full">
            <span>Name</span>
            <input type="text" id="fName" maxlength="80" required />
          </label>

          <label class="field">
            <span>Category</span>
            <select id="fCategory" required>
              <option value="" disabled selected>Select a category</option>
              <option value="Crochet Bags">Crochet Bags</option>
              <option value="Crochet Flowers">Crochet Flowers</option>
              <option value="Crochet Toys">Crochet Toys</option>
              <option value="Crochet Accessories">Crochet Accessories</option>
              <option value="Custom Handmade Gifts">Custom Handmade Gifts</option>
              <option value="New Arrivals">New Arrivals</option>
            </select>
          </label>

          <label class="field">
            <span>Price (₹)</span>
            <input type="number" id="fPrice" min="0" step="1" required />
          </label>

          <label class="field field--full">
            <span>Short description</span>
            <textarea id="fDesc" rows="3" maxlength="400" required></textarea>
          </label>

          <fieldset class="field field--full image-field">
            <legend>Image</legend>
            <div class="image-row">
              <div class="image-preview" id="fPreview">
                <span>No image yet</span>
              </div>
              <div class="image-actions">
                <label class="file-btn">
                  <input type="file" id="fFile" accept="image/*" hidden />
                  Upload photo
                </label>
                <input type="text" id="fImage" placeholder="Or paste an image URL" />
                <button type="button" id="fClearImg" class="link-btn">Use illustration instead</button>
              </div>
            </div>
          </fieldset>

          <label class="field">
            <span>Fallback illustration</span>
            <select id="fArt">
              <option value="flower">Flower</option>
              <option value="bag">Bag</option>
              <option value="toy">Toy</option>
              <option value="yarn">Yarn ball</option>
              <option value="heart">Heart</option>
            </select>
          </label>

          <label class="field">
            <span>Badge (optional)</span>
            <input type="text" id="fBadge" maxlength="20" placeholder="e.g. New, Bestseller" />
          </label>

          <p id="formError" class="form-error" hidden></p>

          <footer class="modal__foot">
            <button type="button" class="btn btn--ghost" data-close>Cancel</button>
            <button type="submit" class="btn btn--primary">Save product</button>
          </footer>
        </form>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" hidden></div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
